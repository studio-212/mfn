<!-- CART BACKDROP -->
<div id="cart-backdrop" onclick="closeCart()"></div>

<!-- CART DRAWER -->
<div id="cart-drawer">
  <div class="cart-header">
    <span class="cart-title">Your cart</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="cart-count-badge" id="cart-badge">0</span>
      <button class="cart-close" onclick="closeCart()">&#x2715;</button>
    </div>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">
      <div class="cart-empty-icon">○</div>
      <span class="cart-empty-text">Nothing here yet</span>
    </div>
  </div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-subtotal">
      <span class="cart-subtotal-label">Subtotal</span>
      <span class="cart-subtotal-amount" id="cart-total">£0</span>
    </div>
    <button class="cart-checkout-btn" id="checkout-btn" onclick="startCheckout()">
      Checkout with Stripe
    </button>
    <p class="cart-note">Secure payment via Stripe · Shipping calculated at checkout</p>
  </div>
</div>

<!-- SIZE SELECTOR SHEET -->
<div id="size-modal" onclick="closeSizeModal()">
  <div id="size-modal-backdrop"></div>
  <div class="size-sheet" onclick="event.stopPropagation()">
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:20px">
      <div id="detail-img" style="width:72px;height:88px;border-radius:4px;flex-shrink:0"></div>
      <div style="display:flex;flex-direction:column;gap:4px;padding-top:2px">
        <p class="size-sheet-title" id="size-modal-name">Garden tee</p>
        <p id="detail-sub" style="font-size:9px;letter-spacing:0.1em;color:var(--cream);opacity:0.4;text-transform:uppercase"></p>
        <p class="size-sheet-price" id="size-modal-price">£28</p>
      </div>
    </div>
    <div id="color-section" style="display:none">
      <p class="color-section-label">Colour</p>
      <div class="color-options" id="color-options"></div>
    </div>
    <div class="size-options" id="size-options"></div>
    <button class="size-confirm-btn" id="size-confirm-btn" onclick="confirmSelection()" disabled>
      Select a size
    </button>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
