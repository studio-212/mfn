<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mau from nowhere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════
   TOKENS — EPK accurate
═══════════════════════════════════ */
:root {
  --bg:     #2a3828;   /* EPK deep forest */
  --cream:  #e8e0cc;   /* EPK cream — all text */
  --dim:    rgba(232,224,204,0.4);
  --fd:     'Playfair Display', Georgia, serif;
  --fu:     'Jost', sans-serif;
  --ease:   cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════
   RESET
═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--fu); color: var(--cream); }
a { text-decoration: none; color: inherit; }

/* ═══════════════════════════════════
   FIXED VIDEO BACKGROUND
═══════════════════════════════════ */
#bg {
  position: fixed; inset: 0; z-index: 0;
}
#bg-video {
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0.35; display: block;
}
#bg-fall {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 40% 30%, #3a5a28 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, #1e3018 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, #2a4a20 0%, transparent 50%),
    var(--bg);
}
#bg::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(20,28,18,0.6) 100%);
  pointer-events: none;
}

/* ═══════════════════════════════════
   HOME SCREEN
═══════════════════════════════════ */
#home {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
}
#home.hidden {
  opacity: 0; transform: scale(0.96); pointer-events: none;
}

/* Wrapper — sizes both the flower SVG and the photo-fill layer together */
#flower-wrap {
  position: relative;
  width: min(96vw, 96vh);
  height: min(96vw, 96vh);
  max-width: 1100px;
  max-height: 1100px;
}

/* The flower SVG — petals as clickable paths */
#flower {
  width: 100%;
  height: 100%;
  cursor: default;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* Photo-fill layer — separate SVG composites independently from the flower */
#petal-fills {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: visible;
}
.petal-fill-img {
  opacity: 0;
  transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Petal fill — behind the logo, lights up on hover */
.petal-path {
  fill: transparent;
  stroke: none;
  cursor: pointer;
  transform-box: fill-box;
  transform-origin: center;
  transform: scale(1.13);
}

/* Petal click zones — transparent, just capture events */
.petal-g { cursor: pointer; }

/* Petal label */
.petal-label {
  font-family: var(--fu);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  fill: var(--cream);
  opacity: 0.7;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* Centre wordmark */
#mfn-name {
  font-family: var(--fd);
  font-style: italic;
  font-weight: 700;
  font-size: 28px;
  color: var(--cream);
  opacity: 0.9;
  letter-spacing: 0.05em;
  display: block;
  text-align: center;
}

/* MFN logo in centre */
#mfn-centre {
  position: absolute;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  pointer-events: none;
}
#mfn-logo-img {
  width: clamp(64px, 10vw, 88px);
  opacity: 0.9;
}
#mfn-sub {
  font-family: var(--fu);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream);
  opacity: 0.45;
}

/* Load animation */
#flower { opacity: 0; animation: bloom 1.2s var(--ease) 0.4s forwards; }
@keyframes bloom {
  from { opacity: 0; transform: scale(0.88) rotate(-8deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ═══════════════════════════════════
   SECTION OVERLAY
   Opens over the home screen.
═══════════════════════════════════ */
#overlay {
  position: fixed; inset: 0; z-index: 20;
  background: var(--bg);
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s var(--ease);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#overlay.open {
  opacity: 1; pointer-events: all;
}

/* Back button */
#back {
  position: sticky; top: 0; left: 0; right: 0;
  z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px;
  background: linear-gradient(to bottom, var(--bg) 70%, transparent);
}
#back-btn {
  display: flex; align-items: center; gap: 10px;
  font-size: 9px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--cream); opacity: 0.4; cursor: pointer;
  transition: opacity 0.2s;
  background: none; border: none; padding: 0;
}
#back-btn:hover { opacity: 0.9; }
.back-arrow { font-size: 20px; font-weight: 300; line-height: 1; }
#back-section-name { display: none; }

/* Section content wrapper */
#section-content {
  padding: 0 28px 80px;
  min-height: 100vh;
}

/* ═══════════════════════════════════
   SECTION: WORLD
═══════════════════════════════════ */
.world-hero {
  padding-top: 20px;
  margin-bottom: 48px;
}
.world-title {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(72px, 22vw, 160px);
  line-height: 0.82; letter-spacing: -0.03em;
  color: var(--cream); margin-bottom: 16px;
  margin-left: -2px;
}
.world-sub {
  font-size: 9px; font-weight: 300; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--cream); opacity: 0.35;
}

/* Project — one per era */
.project {
  margin-bottom: 64px;
  padding-bottom: 64px;
  border-bottom: 0.5px solid rgba(232,224,204,0.1);
}
.project:last-child { border-bottom: none; }

.proj-year {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(80px, 20vw, 140px);
  line-height: 1; letter-spacing: -0.03em;
  color: var(--cream); opacity: 0.04;
  margin-bottom: -0.6em;
  display: block; pointer-events: none;
  user-select: none;
}
.proj-title {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(32px, 8vw, 56px);
  line-height: 0.92; color: var(--cream);
  margin-bottom: 6px;
}
.proj-type {
  font-size: 9px; font-weight: 400; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--cream); opacity: 0.4;
  margin-bottom: 20px;
}

/* Project artwork — organic clip via SVG path */
.proj-art {
  width: 100%; aspect-ratio: 1;
  border-radius: 4px; overflow: hidden;
  margin-bottom: 20px;
  position: relative;
  /* CONTENT: Replace background with <img> for real artwork */
}
.proj-art img { width:100%; height:100%; object-fit:cover; display:block; }

/* Placeholder gradients */
.pa-pressure { background: linear-gradient(145deg,#1a2a18,#3a5a28 40%,#c87a5a 100%); }
.pa-softsteps { background: linear-gradient(145deg,#2a1a0a,#5a3a18 50%,#8ab870 100%); }
.pa-early { background: linear-gradient(145deg,#0a1a18,#1a3a38 50%,#5a8a78 100%); }

.proj-desc {
  font-size: 13px; font-weight: 300; line-height: 1.85;
  color: var(--cream); opacity: 0.55; margin-bottom: 20px;
}

/* Press quotes for project */
.proj-quotes { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.proj-quote {
  font-family: var(--fd); font-style: italic;
  font-size: 14px; color: var(--cream); opacity: 0.65; line-height: 1.5;
  border-left: 1px solid rgba(232,224,204,0.25);
  padding-left: 14px;
}
.proj-quote-src {
  font-size: 8px; font-weight: 400; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--cream); opacity: 0.3;
  padding-left: 14px; margin-top: 4px;
}

/* Track list */
.track-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 24px; }
.track-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 12px 12px;
  border-top: 0.5px solid rgba(232,224,204,0.07);
  border-left: 1.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.2s, padding 0.2s;
}
.track-row:last-child { border-bottom: 0.5px solid rgba(232,224,204,0.07); }
.track-row:hover { border-left-color: rgba(232,224,204,0.4); }
.track-left { display: flex; flex-direction: column; gap: 2px; }
.track-name { font-family: var(--fd); font-style: italic; font-size: 16px; color: var(--cream); }
.track-feat { font-size: 9px; color: var(--cream); opacity: 0.35; letter-spacing: 0.04em; }
.track-stream {
  font-size: 8px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--cream); opacity: 0.4;
  border: 0.5px solid rgba(232,224,204,0.2);
  padding: 5px 12px; border-radius: 99px; transition: opacity 0.2s;
}
.track-row:hover .track-stream { opacity: 0.8; }

/* Video thumbs */
.video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.video-thumb {
  aspect-ratio: 16/9; border-radius: 4px; overflow: hidden;
  position: relative; cursor: pointer;
  background: rgba(232,224,204,0.06);
  border: 0.5px solid rgba(232,224,204,0.08);
}
.video-thumb img { width:100%; height:100%; object-fit:cover; }
.video-thumb-label {
  position: absolute; bottom: 8px; left: 10px;
  font-size: 9px; font-weight: 300; letter-spacing: 0.06em;
  color: var(--cream); opacity: 0.7;
}
/* Placeholder video thumbs */
.vt1 { background: linear-gradient(135deg,#1a2a10,#3a5020); }
.vt2 { background: linear-gradient(135deg,#200a0a,#502020); }
.vt3 { background: linear-gradient(135deg,#0a1a20,#205040); }
.vt4 { background: linear-gradient(135deg,#1a100a,#403010); }

.proj-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ═══════════════════════════════════
   SECTION: ABOUT
═══════════════════════════════════ */
.about-hero { padding-top: 20px; margin-bottom: 36px; }
.about-title {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(72px, 22vw, 160px);
  line-height: 0.82; letter-spacing: -0.03em; color: var(--cream);
  margin-left: -2px;
}

/* Portrait — organic clip */
.about-portrait {
  width: 100%; max-width: 420px; aspect-ratio: 3/4; margin-bottom: 28px;
  border-radius: 4px; overflow: hidden;
  /* CONTENT: Replace with real portrait <img> */
  background: linear-gradient(160deg,#1a2a14,#3a5024 50%,#5a7840);
}
.about-portrait img { width:100%; height:100%; object-fit:cover; }

.about-quote {
  font-family: var(--fd); font-style: italic;
  font-size: clamp(18px, 4.5vw, 26px);
  color: var(--cream); line-height: 1.45;
  border-left: 1px solid rgba(232,224,204,0.3);
  padding-left: 18px; margin-bottom: 6px;
}
.about-quote-src {
  font-size: 8px; font-weight: 400; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--cream); opacity: 0.3;
  padding-left: 18px; margin-bottom: 28px; display: block;
}
.about-bio {
  font-size: 16px; font-weight: 300; line-height: 2.0;
  color: var(--cream); opacity: 0.65; margin-bottom: 32px;
}

/* Press marquee */
.press-marquee-wrap {
  overflow: hidden;
  margin: 0 -28px 32px;
  padding: 16px 0;
  border-top: 0.5px solid rgba(232,224,204,0.08);
  border-bottom: 0.5px solid rgba(232,224,204,0.08);
  mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
  user-select: none; -webkit-user-select: none;
}
.press-marquee-track {
  display: flex; gap: 48px; width: max-content;
  animation: marquee 32s linear infinite;
}
.press-marquee-wrap:hover .press-marquee-track { animation-play-state: paused; }
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.press-name {
  font-size: 9px; font-weight: 400; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--cream); opacity: 0.35;
  white-space: nowrap; pointer-events: none;
}

/* Achievements */
.achievements { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
.achievement {
  display: flex; gap: 14px; align-items: flex-start;
  padding-bottom: 14px; border-bottom: 0.5px solid rgba(232,224,204,0.06);
}
.ach-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--cream); opacity: 0.3; margin-top: 6px; flex-shrink: 0; }
.ach-text { font-size: 13px; font-weight: 300; line-height: 1.6; color: var(--cream); opacity: 0.55; }

/* ═══════════════════════════════════
   SECTION: SHOWS
═══════════════════════════════════ */
.shows-hero { padding-top: 20px; margin-bottom: 36px; }
.shows-title {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(72px, 22vw, 160px);
  line-height: 0.82; letter-spacing: -0.03em; color: var(--cream);
  margin-left: -2px;
}
.show-list { display: flex; flex-direction: column; }
.show-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 24px 0; border-top: 0.5px solid rgba(232,224,204,0.08);
  position: relative;
}
.show-row:last-child { border-bottom: 0.5px solid rgba(232,224,204,0.08); }
.show-row.sold-out { opacity: 1; }
.show-l {
  display: flex; flex-direction: column; gap: 2px;
  position: relative;
  width: fit-content;
}
.show-date {
  font-family: var(--fd); font-style: italic;
  font-size: clamp(22px, 5.5vw, 38px);
  line-height: 0.95; letter-spacing: -0.02em;
  color: var(--cream);
}
.show-meta {
  display: flex; flex-direction: column; gap: 4px;
}
.show-city {
  font-size: 11px; font-weight: 400; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--cream); opacity: 0.6;
}
.show-venue {
  font-size: 11px; font-weight: 400; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--cream); opacity: 0.35;
}
.show-row.sold-out .show-city,
.show-row.sold-out .show-venue { opacity: 0.25; }
/* Diagonal slash — scoped to date text width only */
.show-row.sold-out .show-date {
  position: relative;
  opacity: 0.4;
}
.show-row.sold-out .show-date::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%; height: 1.5px;
  background: rgba(232,224,204,0.9);
  transform: rotate(-6deg);
  pointer-events: none;
}
.show-tk {
  flex-shrink: 0; font-size: 8px; font-weight: 400; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--cream); opacity: 0.5;
  border: 0.5px solid rgba(232,224,204,0.2);
  padding: 8px 18px; border-radius: 99px; transition: opacity 0.2s;
  white-space: nowrap;
}
.show-tk:hover { opacity: 1; }
.show-tk.out { opacity: 0.25; cursor: default; pointer-events: none; }
.booking-note {
  margin-top: 28px; font-size: 9px; font-weight: 300;
  letter-spacing: 0.06em; color: var(--cream); opacity: 0.35;
}
.booking-note a { border-bottom: 0.5px solid rgba(232,224,204,0.2); padding-bottom: 1px; }

/* Stack on narrow screens */
@media (max-width: 480px) {
  .show-row {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    align-items: center;
  }
  .show-meta { grid-column: 1; grid-row: 1; }
  .show-l    { grid-column: 1; grid-row: 2; }
  .show-tk   { grid-column: 2; grid-row: 1 / 3; align-self: center; }
}
/* ═══════════════════════════════════
   SHOP — product grid
═══════════════════════════════════ */
.shop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 14px;
  margin-bottom: 48px;
}
.shop-card {
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
}
.shop-img {
  width: 100%; aspect-ratio: 3/4;
  border-radius: 6px; overflow: hidden;
  position: relative;
  border: 0.5px solid rgba(232,224,204,0.08);
}
.shop-img-inner {
  width: 100%; height: 100%; display: flex;
  align-items: center; justify-content: center;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.shop-card:hover .shop-img-inner { transform: scale(1.04); }
.shop-badge {
  position: absolute; top: 10px; left: 10px;
  font-size: 7px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--bg); background: var(--cream);
  padding: 4px 10px; border-radius: 99px;
}
.shop-badge.sold { background: rgba(232,224,204,0.18); color: var(--cream); }
.shop-add-btn {
  position: absolute; bottom: 10px; right: 10px;
  font-size: 7px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--cream); background: rgba(42,56,40,0.85);
  border: 0.5px solid rgba(232,224,204,0.3);
  padding: 6px 12px; border-radius: 99px;
  opacity: 0; transition: opacity 0.25s;
  cursor: pointer;
}
.shop-card:hover .shop-add-btn { opacity: 1; }
.shop-card-info { display: flex; flex-direction: column; gap: 3px; }
.shop-card-name {
  font-family: var(--fd); font-style: italic;
  font-size: 18px; color: var(--cream); line-height: 1.2;
}
.shop-card-sub {
  font-size: 9px; color: var(--cream); opacity: 0.35;
  letter-spacing: 0.08em;
}
.shop-card-price {
  font-size: 12px; color: var(--cream); opacity: 0.5;
  margin-top: 2px;
}

/* ═══════════════════════════════════
   CART DRAWER
═══════════════════════════════════ */
#cart-drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(380px, 100vw);
  background: var(--bg);
  border-left: 0.5px solid rgba(232,224,204,0.1);
  z-index: 100;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
}
#cart-drawer.open { transform: translateX(0); }
#cart-backdrop {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(20,30,18,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
#cart-backdrop.open { opacity: 1; pointer-events: all; }

.cart-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 24px;
  border-bottom: 0.5px solid rgba(232,224,204,0.08);
  flex-shrink: 0;
}
.cart-title {
  font-family: var(--fu); font-size: 9px; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--cream); opacity: 0.5;
}
.cart-count-badge {
  font-size: 9px; color: var(--bg); background: var(--cream);
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
}
.cart-close {
  font-size: 18px; color: var(--cream); opacity: 0.4;
  background: none; border: none; cursor: pointer;
  transition: opacity 0.2s; line-height: 1;
  padding: 0;
}
.cart-close:hover { opacity: 1; }

.cart-items {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}
.cart-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 10px; opacity: 0.3;
  padding: 40px;
}
.cart-empty-icon { font-size: 32px; }
.cart-empty-text {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--cream);
}

.cart-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 16px 24px;
  border-bottom: 0.5px solid rgba(232,224,204,0.06);
}
.cart-item-img {
  width: 60px; height: 72px; border-radius: 4px;
  flex-shrink: 0; overflow: hidden;
}
.cart-item-body { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.cart-item-name {
  font-family: var(--fd); font-style: italic;
  font-size: 14px; color: var(--cream);
}
.cart-item-variant {
  font-size: 9px; color: var(--cream); opacity: 0.35;
  letter-spacing: 0.08em;
}
.cart-item-controls {
  display: flex; align-items: center; gap: 10px; margin-top: 6px;
}
.cart-qty-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 0.5px solid rgba(232,224,204,0.25);
  background: none; color: var(--cream);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s; line-height: 1;
}
.cart-qty-btn:hover { border-color: rgba(232,224,204,0.6); }
.cart-qty { font-size: 12px; color: var(--cream); min-width: 16px; text-align: center; }
.cart-item-price {
  font-size: 12px; color: var(--cream); opacity: 0.45;
  margin-left: auto; align-self: flex-start; margin-top: 2px;
}
.cart-item-remove {
  background: none; border: none; cursor: pointer;
  color: var(--cream); opacity: 0.2; font-size: 11px;
  padding: 0; transition: opacity 0.2s;
}
.cart-item-remove:hover { opacity: 0.6; }

.cart-footer {
  padding: 20px 24px 32px;
  border-top: 0.5px solid rgba(232,224,204,0.08);
  flex-shrink: 0;
}
.cart-subtotal {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px;
}
.cart-subtotal-label {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--cream); opacity: 0.4;
}
.cart-subtotal-amount {
  font-family: var(--fd); font-style: italic;
  font-size: 22px; color: var(--cream);
}
.cart-checkout-btn {
  width: 100%; padding: 14px;
  background: var(--cream); color: var(--bg);
  border: none; border-radius: 99px; cursor: pointer;
  font-family: var(--fu); font-size: 9px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase;
  transition: opacity 0.2s;
}
.cart-checkout-btn:hover { opacity: 0.85; }
.cart-checkout-btn:disabled { opacity: 0.3; cursor: default; }
.cart-note {
  text-align: center; margin-top: 10px;
  font-size: 8px; color: var(--cream); opacity: 0.2;
  letter-spacing: 0.08em;
}

/* Cart trigger button */
#cart-trigger {
  display: none;
  align-items: center; gap: 8px;
  background: none; border: 0.5px solid rgba(232,224,204,0.2);
  border-radius: 99px; padding: 8px 16px;
  cursor: pointer; transition: border-color 0.2s;
  color: var(--cream);
}
#cart-trigger:hover { border-color: rgba(232,224,204,0.5); }
#cart-trigger-label {
  font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase;
  opacity: 0.5;
}
#cart-trigger-count {
  font-size: 9px; font-weight: 500;
  background: var(--cream); color: var(--bg);
  width: 16px; height: 16px; border-radius: 50%;
  display: none;
  align-items: center; justify-content: center;
}

/* Size selector modal */
#size-modal {
  position: fixed; inset: 0; z-index: 110;
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}
#size-modal.open { pointer-events: all; opacity: 1; }
#size-modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(20,30,18,0.7);
}
.size-sheet {
  position: relative; z-index: 1;
  background: #1e2e1c; border-radius: 16px 16px 0 0;
  padding: 28px 24px 40px; width: 100%; max-width: 480px;
  border-top: 0.5px solid rgba(232,224,204,0.1);
  transform: translateY(20px);
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
#size-modal.open .size-sheet { transform: translateY(0); }
.size-sheet-title {
  font-family: var(--fd); font-style: italic;
  font-size: 20px; color: var(--cream);
  margin-bottom: 4px;
}
.size-sheet-price {
  font-size: 11px; color: var(--cream); opacity: 0.4;
  margin-bottom: 20px; letter-spacing: 0.06em;
}
.size-options {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.size-opt {
  padding: 9px 18px; border-radius: 99px;
  border: 0.5px solid rgba(232,224,204,0.2);
  font-size: 11px; color: var(--cream); cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: none;
}
.size-opt:hover { border-color: rgba(232,224,204,0.5); }
.size-opt.selected {
  border-color: var(--cream);
  background: rgba(232,224,204,0.08);
}
.size-opt.unavail { opacity: 0.2; cursor: default; text-decoration: line-through; }
.size-confirm-btn {
  width: 100%; padding: 14px;
  background: var(--cream); color: var(--bg);
  border: none; border-radius: 99px; cursor: pointer;
  font-family: var(--fu); font-size: 9px; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase;
  transition: opacity 0.2s;
}
.size-confirm-btn:hover { opacity: 0.85; }
.size-confirm-btn:disabled { opacity: 0.3; cursor: default; }
.color-section-label {
  font-family: var(--fu); font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--cream); opacity: 0.35;
  margin-bottom: 10px;
}
.color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  outline: 2px solid rgba(232,224,204,0.12); outline-offset: 3px;
  transition: outline-color 0.2s, transform 0.15s; border: none;
}
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.selected { outline-color: var(--cream); }
.color-swatch.unavail { opacity: 0.2; cursor: default; }

/* ═══════════════════════════════════
   SECTION: SHOP
═══════════════════════════════════ */
.shop-hero { padding-top: 20px; margin-bottom: 64px; }
.shop-title {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(72px, 22vw, 160px);
  line-height: 0.82; letter-spacing: -0.03em; color: var(--cream);
  margin-left: -2px;
}
.merch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.mc-card { display: flex; flex-direction: column; gap: 8px; cursor: pointer; }
.mc-img {
  width: 100%; aspect-ratio: 3/4; border-radius: 4px; overflow: hidden;
  position: relative; border: 0.5px solid rgba(232,224,204,0.06);
}
.mc-img img { width:100%; height:100%; object-fit:cover; }
.mi1 { background: linear-gradient(160deg,#1a2a14,#3a5028); }
.mi2 { background: linear-gradient(160deg,#2a1a0a,#503018); }
.mi3 { background: linear-gradient(160deg,#1a2020,#304040); }
.mi4 { background: linear-gradient(160deg,#1a1a14,#383828); }
.mc-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: 7px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--bg); background: var(--cream);
  padding: 3px 8px; border-radius: 99px;
}
.mc-badge.out { background: rgba(232,224,204,0.15); color: var(--cream); }
.mc-info { display: flex; justify-content: space-between; align-items: baseline; }
.mc-name { font-family: var(--fd); font-style: italic; font-size: 15px; color: var(--cream); }
.mc-price { font-size: 11px; color: var(--cream); opacity: 0.35; }

/* ═══════════════════════════════════
   SECTION: ? (sixth, TBD)
═══════════════════════════════════ */
.tbd-hero {
  padding-top: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 80vh; text-align: center; gap: 16px;
}
.tbd-mark {
  font-family: var(--fd); font-style: italic; font-weight: 700;
  font-size: clamp(80px, 20vw, 140px);
  line-height: 1; color: var(--cream); opacity: 0.15;
}
.tbd-note {
  font-size: 10px; font-weight: 300; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--cream); opacity: 0.25;
}

/* ═══════════════════════════════════
   SHARED BUTTONS
═══════════════════════════════════ */
.btn-cream {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 9px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--bg); background: var(--cream);
  padding: 10px 22px; border-radius: 99px; transition: opacity 0.2s;
}
.btn-cream:hover { opacity: 0.82; }

.btn-outline {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 9px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--cream); border: 0.5px solid rgba(232,224,204,0.28);
  padding: 10px 22px; border-radius: 99px; transition: border-color 0.2s;
}
.btn-outline:hover { border-color: rgba(232,224,204,0.65); }

/* ═══════════════════════════════════
   DESKTOP
═══════════════════════════════════ */
@media (min-width: 640px) {
  #section-content { padding: 0 52px 80px; }
  #back { padding: 24px 52px; }
  .merch-grid { grid-template-columns: repeat(4,1fr); }
  .mc-img { aspect-ratio: 1; }
  .video-grid { grid-template-columns: repeat(3,1fr); }
  .proj-art { max-width: 400px; }
  .shop-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 960px) {
  .shop-grid { grid-template-columns: repeat(4, 1fr); }
  .merch-grid { grid-template-columns: repeat(6, 1fr); }
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function ytThumb(url) {
  const m = String(url).match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : null;
}

function renderWorld(releases) {
  const projects = releases.filter(r => r.visible !== false).map(r => {
    const quotes = (r.release_quotes || [])
      .sort((a,b) => (a.sort_order||0)-(b.sort_order||0))
      .map(q => `<div><p class="proj-quote">"${esc(q.quote)}"</p><p class="proj-quote-src">${esc(q.source)}</p></div>`)
      .join('');

    const trackRows = (r.release_tracks || [])
      .sort((a,b) => (a.sort_order||0)-(b.sort_order||0))
      .map(t => `<a class="track-row" href="${esc(t.stream_url)}" target="_blank">
        <div class="track-left">
          <span class="track-name">${esc(t.name)}</span>
          ${t.feat ? `<span class="track-feat">${esc(t.feat)}</span>` : ''}
        </div>
        <span class="track-stream">&#9654; Stream</span>
      </a>`).join('');
    const trackCount = (r.release_tracks||[]).length;
    const tlId = `tl-${r.id}`;
    const trackSection = trackRows ? `<p class="tl-label">Tracklist</p>
    <div class="tl-wrap" id="${tlId}">
      <div class="track-list">${trackRows}</div>
      <div class="tl-fade"></div>
    </div>
    <button class="tl-toggle" onclick="toggleTracks('${tlId}',${trackCount})"><span class="tl-count">${trackCount} tracks +</span></button>` : '';

    const videos = Array.isArray(r.videos) ? r.videos : [];
    const videoThumbs = videos.map(v => {
      const thumb = ytThumb(v.url);
      return `<a class="video-thumb" href="${esc(v.url)}" target="_blank">
        ${thumb ? `<img src="${esc(thumb)}" alt="${esc(v.title)}">` : ''}
        <span class="video-thumb-label">${esc(v.title)}</span>
      </a>`;
    }).join('');
    const videoSection = videos.length ? `<div class="video-grid">${videoThumbs}</div>` : '';

    const artInner = r.cover_art_url ? `<img src="${esc(r.cover_art_url)}" alt="${esc(r.title)}">` : '';
    const pLinks = Array.isArray(r.platform_links) && r.platform_links.length ? r.platform_links : null;
    const btns = pLinks
      ? pLinks.map((l, i) => `<a href="${esc(l.url)}" target="_blank" class="${i===0?'btn-cream':'btn-outline'}">&#9654; ${esc(l.platform)}</a>`)
      : [
          r.spotify_url  ? `<a href="${esc(r.spotify_url)}" target="_blank" class="btn-cream">&#9654; Stream on Spotify</a>` : '',
          r.bandcamp_url ? `<a href="${esc(r.bandcamp_url)}" target="_blank" class="btn-outline">Buy on Bandcamp</a>` : '',
        ].filter(Boolean);

    return `<div class="project">
      <p class="proj-year">${esc(r.year)}</p>
      <h3 class="proj-title">${esc(r.title)}</h3>
      <p class="proj-type">${esc(r.type)}</p>
      <div class="proj-art">${artInner}</div>
      <p class="proj-desc">${esc(r.description).replace(/\n/g,'<br>')}</p>

      ${videoSection}
      ${btns.length ? `<div class="proj-actions">${btns.join('')}</div>` : ''}

    <h2 class="world-title">World</h2>

  </div>${projects}`;
}

function renderAbout(d) {
  const names = Array.isArray(d.press_names) ? d.press_names : [];
  const marquee = [...names, ...names].map(n => `<span class="press-name">${esc(n)}</span>`).join('');
  const ach = (Array.isArray(d.achievements) ? d.achievements : [])
    .map(a => `<div class="achievement"><div class="ach-dot"></div><p class="ach-text">${esc(a)}</p></div>`).join('');
  const portrait = d.portrait_url ? `<img src="${esc(d.portrait_url)}" alt="mau from nowhere">` : '';
  const email = esc(d.contact_email || 'mgmt.mfn@gmail.com');
  return `<div class="about-hero"><h2 class="about-title">About</h2></div>
    <div class="about-portrait">${portrait}</div>
    <blockquote class="about-quote">"${esc(d.quote)}"</blockquote>
    <span class="about-quote-src">${esc(d.quote_source)}</span>
    <p class="about-bio">${esc(d.bio).replace(/\n\n/g,'<br><br>')}</p>
    <div class="press-marquee-wrap"><div class="press-marquee-track">${marquee}</div></div>
    <div class="achievements">${ach}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;padding-bottom:40px">
      <a href="mailto:${email}?subject=EPK%20Request" target="_blank" class="btn-cream">&#8595; Download EPK</a>
      <a href="mailto:${email}" class="btn-outline">Get in touch</a>
    </div>`;
}

function renderShows(shows, bookingEmail) {
  const rows = shows.map(s => `<div class="show-row${s.sold_out ? ' sold-out' : ''}">
    <div class="show-l"><span class="show-date">${esc(s.date)}</span></div>
    <div class="show-meta"><span class="show-city">${esc(s.city)}</span><span class="show-venue">${esc(s.venue)}</span></div>
    ${s.sold_out
      ? `<a href="#" class="show-tk out">Sold out</a>`
      : `<a href="${esc(s.ticket_url||'#')}" target="_blank" class="show-tk">Tickets</a>`}
  </div>`).join('');
  const email = esc(bookingEmail || 'mgmt.mfn@gmail.com');
  return `<div class="shows-hero"><h2 class="shows-title">Shows</h2></div>
    <div class="show-list">${rows}</div>
    <p class="booking-note">Booking — <a href="mailto:${email}">${email}</a></p>`;
}

function renderShop(products) {
  const cards = products.map(p => {
    const soldOut = !!p.sold_out;
    const imgContent = p.image_url
      ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}" style="width:100%;height:100%;object-fit:cover;">`
      : `<div class="shop-img-inner" style="width:100%;height:100%;background:rgba(232,224,204,0.06)"></div>`;
    const badge = soldOut
      ? `<span class="shop-badge sold">Sold out</span>`
      : (p.badge ? `<span class="shop-badge">${esc(p.badge)}</span>` : '');
    const addBtn = !soldOut
      ? `<button class="shop-add-btn" onclick="quickBuy('${esc(p.slug)}',event)">Buy</button>` : '';
    return `<div class="shop-card" onclick="openProductDetail('${esc(p.slug)}')">

      <div class="shop-card-info">

function updateStreamLinks(links) {

}

function rebuildProducts(products) {

}

async function loadContent() {
  if (!sb) return;
  try {
    const [relR, abtR, shwR, prdR, stmR, setR] = await Promise.all([
      sb.from('releases').select('*, release_quotes(*), release_tracks(*)').order('sort_order'),
      sb.from('about').select('*').limit(1).single(),
      sb.from('shows').select('*').order('sort_order'),
      sb.from('products').select('*').eq('active', true).order('sort_order'),
      sb.from('stream_links').select('*').order('sort_order'),
      sb.from('settings').select('key, value'),
    ]);
    const get = (key) => (setR.data || []).find(s => s.key === key)?.value || '';
    if (relR.data?.length)  sections.world.html = renderWorld(relR.data);
    if (abtR.data)          sections.about.html = renderAbout(abtR.data);
    if (shwR.data?.length)  sections.shows.html = renderShows(shwR.data, get('booking_email'));
    if (prdR.data?.length) {
      sections.shop.html = renderShop(prdR.data);
      rebuildProducts(prdR.data);
    }
    if (stmR.data?.length)  updateStreamLinks(stmR.data);
  } catch {
    /* Supabase unavailable — fallback content stays */
  }
}
loadContent();

<script>
/* ═══════════════════════════════════
   On touch devices, tilt the phone to
   highlight the petal in that direction.
   Centre = no selection.
═══════════════════════════════════ */

(function() {
  if (!window.DeviceOrientationEvent) return;

  // Petal directions in degrees (0 = up, clockwise)
  // Mapped from their SVG position relative to centre (280,280)
  const PETALS = [
    { section: 'world',  angle: 315 },  // top-left
    { section: 'about',  angle: 45  },  // top-right
    { section: 'shows',  angle: 90  },  // right
    { section: 'shop',   angle: 135 },  // bottom-right
    { section: 'tbd',    angle: 225 },  // bottom-left
    { section: 'stream', angle: 270 },  // left
  ];

  const DEADZONE = 4;      // degrees tilt before activation
  const SPREAD   = 45;     // degrees either side of petal angle that maps to it
  let activeSection = null;
  let permissionGranted = false;

  function angleDiff(a, b) {
    let d = Math.abs(a - b) % 360;
    return d > 180 ? 360 - d : d;
  }

  let baseGamma = null;
  let baseBeta  = null;

  function calibrate(gamma, beta) {
    baseGamma = gamma;
    baseBeta  = beta;
  }

  function getTiltAngle(gamma, beta) {
    const g = gamma - (baseGamma || 0);
    const b = -(beta  - (baseBeta  || 0));
    return (Math.atan2(g, b) * 180 / Math.PI + 360) % 360;
  }

  function getTiltMagnitude(gamma, beta) {
    const g = gamma - (baseGamma || 0);
    const b = beta  - (baseBeta  || 0);
    return Math.sqrt(g * g + b * b);
  }

  function setActive(section) {
    if (section === activeSection) return;
    activeSection = section;

    if (!document.getElementById('home').classList.contains('hidden')) {
      document.querySelectorAll('.petal-path').forEach(p => { p.style.fill = 'transparent'; });
      document.querySelectorAll('#petal-fills image, #petal-fills .petal-fill-ovl').forEach(el => {
        el.style.opacity = el.dataset.section === section ? '1' : '0';
      });
    }
  }

  function handleOrientation(e) {
    const gamma = e.gamma || 0;
    const beta  = e.beta  || 0;

    // Calibrate on first reading
    if (baseGamma === null) calibrate(gamma, beta);

    const magnitude = getTiltMagnitude(gamma, beta);
    if (magnitude < DEADZONE) {
      setActive(null);
      return;
    }

    const tiltAngle = getTiltAngle(gamma, beta);
    let closest = null;
    let closestDiff = Infinity;

    PETALS.forEach(p => {
      const diff = angleDiff(tiltAngle, p.angle);
      if (diff < SPREAD && diff < closestDiff) {
        closestDiff = diff;
        closest = p.section;
      }
    });

    setActive(closest);
  }

  function startGyro() {
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  const BTN_STYLE = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(42,56,40,0.9);border:0.5px solid rgba(232,224,204,0.2);border-radius:99px;padding:12px 24px;font-family:Jost,sans-serif;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#e8e0cc;opacity:0.7;cursor:pointer;white-space:nowrap;display:none;';

  // Create button once, never remove it
  const gyroBtn = document.createElement('div');
  gyroBtn.id = 'gyro-btn';
  gyroBtn.style.cssText = BTN_STYLE;
  document.body.appendChild(gyroBtn);

  function showGyroBtn() { gyroBtn.style.display = 'block'; }
  function hideGyroBtn() { gyroBtn.style.display = 'none'; }

  function makeRecenterBtn() {
    gyroBtn.textContent = 'Recenter';
    gyroBtn.onclick = () => {
      const h = (e) => {
        calibrate(e.gamma || 0, e.beta || 0);
        window.removeEventListener('deviceorientation', h, true);
      };
      window.addEventListener('deviceorientation', h, true);
    };
    showGyroBtn();
  }

  function checkGyroAvailable(cb) {
    const h = (e) => {
      window.removeEventListener('deviceorientation', h, true);
      cb(e.gamma !== null && e.beta !== null);
    };
    window.addEventListener('deviceorientation', h, true);
    setTimeout(() => {
      window.removeEventListener('deviceorientation', h, true);
      cb(false);
    }, 1000);
  }

  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — show Enable button first
    gyroBtn.textContent = 'Enable motion';
    gyroBtn.onclick = () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            startGyro();
            makeRecenterBtn();
          } else {
            hideGyroBtn();
          }
        })
        .catch(() => hideGyroBtn());
    };
    showGyroBtn();
  } else {
    // Android / other — check for gyro silently
    checkGyroAvailable((hasGyro) => {
      if (hasGyro) {
        startGyro();
        makeRecenterBtn();
      }
    });
  }
})();
</script>


<script>
/* ═══════════════════════════════════
   POINTER-UP NAVIGATION
   Highlight petal on pointerdown/move,
   open on pointerup — works on all devices.
═══════════════════════════════════ */
(function() {
  const flower = document.getElementById('flower');
  if (!flower) return;

  let pressing = false;

  function petalUnder(x, y) {
    // Use elementFromPoint to find which petal-path is under the pointer
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    if (el.classList.contains('petal-path')) return el.dataset.section;
    return null;
  }

  function highlightSection(section) {
    if (document.getElementById('home').classList.contains('hidden')) return;
    document.querySelectorAll('.petal-path').forEach(p => { p.style.fill = 'transparent'; });
    document.querySelectorAll('#petal-fills image, #petal-fills .petal-fill-ovl').forEach(el => {
      el.style.opacity = el.dataset.section === section ? '1' : '0';
    });
  }

  function clearHighlight() {
    document.querySelectorAll('.petal-path').forEach(p => { p.style.fill = 'transparent'; });
    document.querySelectorAll('#petal-fills image, #petal-fills .petal-fill-ovl').forEach(el => { el.style.opacity = '0'; });
  }

  flower.addEventListener('pointerdown', (e) => {
    if (document.getElementById('home').classList.contains('hidden')) return;
    pressing = true;
    flower.setPointerCapture(e.pointerId);
    highlightSection(petalUnder(e.clientX, e.clientY));
  });

  flower.addEventListener('pointermove', (e) => {
    if (!pressing && e.pointerType !== 'mouse') return;
    highlightSection(petalUnder(e.clientX, e.clientY));
  });

  flower.addEventListener('pointerleave', (e) => {
    if (!pressing) clearHighlight();
  });

  flower.addEventListener('pointerup', (e) => {
    if (!pressing) return;
    pressing = false;
    const section = petalUnder(e.clientX, e.clientY);
    clearHighlight();
    if (section) openSection(section);
  });

  flower.addEventListener('pointercancel', () => {
    pressing = false;
    clearHighlight();
  });
})();
</script>
</body>
</html>
